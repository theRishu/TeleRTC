<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Spy View</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #060810;
            overflow: hidden
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block
        }

        audio {
            display: none
        }

        video {
            display: none;
            position: fixed;
            width: 1px;
            height: 1px
        }

        #status {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-family: sans-serif;
            font-size: 10px;
            color: rgba(255, 255, 255, .35);
            letter-spacing: .04em;
            z-index: 10;
        }

        #no-video {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: rgba(255, 255, 255, .3);
            font-family: sans-serif;
        }

        #no-video .ic {
            font-size: 36px;
            opacity: .4
        }

        #no-video p {
            font-size: 12px;
            letter-spacing: .04em
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <video id="hv" autoplay playsinline muted></video>
    <audio id="ha" autoplay playsinline></audio>
    <div id="no-video">
        <div class="ic">📹</div>
        <p>WAITING FOR VIDEO</p>
    </div>
    <div id="status">CONNECTING…</div>
    <script>
        const ROOM_ID = "{{ room_id }}";
        const TOKEN = "{{ token }}";

        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const hidVid = document.getElementById('hv');
        const hidAud = document.getElementById('ha');
        const noVideo = document.getElementById('no-video');
        const statusEl = document.getElementById('status');

        function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
        resize(); window.addEventListener('resize', resize);

        let drawing = false;
        function drawFrame() {
            if (!drawing) return;
            if (hidVid.readyState >= 2 && hidVid.videoWidth > 0) {
                const vw = hidVid.videoWidth, vh = hidVid.videoHeight;
                const cw = canvas.width, ch = canvas.height;
                const sc = Math.max(cw / vw, ch / vh);
                ctx.drawImage(hidVid, (cw - vw * sc) / 2, (ch - vh * sc) / 2, vw * sc, vh * sc);
            }
            requestAnimationFrame(drawFrame);
        }

        let RTCCFG = {
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
            iceCandidatePoolSize: 10,
            bundlePolicy: 'max-bundle',
            sdpSemantics: 'unified-plan'
        };

        async function fetchIceServers() {
            try {
                const r = await fetch(`/api/ice_servers?token=${TOKEN}`);
                if (r.ok) RTCCFG = await r.json();
            } catch (_) {}
        }

        function preferCodecs(sdp, kind) {
            const lines = sdp.split('\r\n');
            const mIdx = lines.findIndex(l => l.startsWith(`m=${kind}`));
            if (mIdx === -1) return sdp;
            const order = kind === 'video' ? ['VP9', 'H264', 'VP8'] : ['opus'];
            const payloads = [];
            order.forEach(codec => {
                lines.forEach(l => {
                    const m = l.match(/^a=rtpmap:(\d+) ([^/\s]+)/i);
                    if (m && m[2].toUpperCase() === codec && !payloads.includes(m[1])) payloads.push(m[1]);
                });
            });
            const parts = lines[mIdx].split(' ');
            const rest = parts.slice(3).filter(p => !payloads.includes(p));
            lines[mIdx] = [...parts.slice(0, 3), ...payloads, ...rest].join(' ');
            return lines.join('\r\n');
        }

        const pcMap = {};
        const candidateQueue = {};
        let myId = null, ws = null;

        function drainCandidates(rid) {
            if (!candidateQueue[rid]) return;
            candidateQueue[rid].forEach(c => {
                pcMap[rid]?.addIceCandidate(new RTCIceCandidate(c)).catch(() => {});
            });
            delete candidateQueue[rid];
        }

        function createPeer(rid) {
            if (pcMap[rid]) return pcMap[rid];
            const pc = new RTCPeerConnection(RTCCFG);
            pcMap[rid] = pc;

            pc.addTransceiver('audio', { direction: 'recvonly' });
            pc.addTransceiver('video', { direction: 'recvonly' });

            pc.ontrack = e => {
                if (e.track.kind === 'video') {
                    hidVid.srcObject = new MediaStream([e.track]);
                    hidVid.play().catch(() => {});
                    noVideo.style.display = 'none';
                    drawing = true;
                    requestAnimationFrame(drawFrame);
                } else {
                    hidAud.srcObject = new MediaStream([e.track]);
                    hidAud.play().catch(() => {});
                }
            };

            pc.onicecandidate = e => {
                if (e.candidate) wsSend({ type: 'candidate', to: rid, candidate: e.candidate });
            };

            pc.onconnectionstatechange = () => {
                statusEl.textContent = pc.connectionState.toUpperCase();
                if (['disconnected', 'failed', 'closed'].includes(pc.connectionState)) {
                    delete pcMap[rid];
                    drawing = false;
                    hidVid.srcObject = null;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    if (!Object.keys(pcMap).length) noVideo.style.display = 'flex';
                }
            };

            pc.onnegotiationneeded = async () => {
                try {
                    const o = await pc.createOffer({ voiceActivityDetection: false });
                    const sdp = preferCodecs(preferCodecs(o.sdp, 'video'), 'audio');
                    await pc.setLocalDescription({ type: o.type, sdp });
                    wsSend({ type: 'offer', to: rid, sdp: pc.localDescription });
                } catch (e) { console.error(e); }
            };

            return pc;
        }

        function connectWS() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(`${proto}://${location.host}/ws/${ROOM_ID}?role=spy&token=${TOKEN}`);
            ws.onopen = () => statusEl.textContent = 'CONNECTED';
            ws.onmessage = async e => { let d; try { d = JSON.parse(e.data); } catch { return; } await handle(d); };
            ws.onclose = () => {
                Object.values(pcMap).forEach(p => { try { p.close(); } catch (_) {} });
                Object.keys(pcMap).forEach(k => delete pcMap[k]);
                setTimeout(connectWS, 3000);
            };
            ws.onerror = e => console.error('[Spy WS]', e);
        }

        function wsSend(d) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(d)); }

        async function handle(d) {
            switch (d.type) {
                case 'room_state':
                    myId = d.peer_id;
                    for (const pid of d.peers) { if (!pid.startsWith('spy_')) createPeer(pid); }
                    break;
                case 'peer_joined':
                    if (d.peer_id === myId || d.role === 'spy') break;
                    createPeer(d.peer_id);
                    break;
                case 'peer_left':
                    { const pc = pcMap[d.peer_id]; if (pc) { pc.close(); delete pcMap[d.peer_id]; } }
                    delete candidateQueue[d.peer_id];
                    if (!Object.keys(pcMap).length) { drawing = false; noVideo.style.display = 'flex'; }
                    break;
                case 'answer':
                    if (d.to !== myId) break;
                    try {
                        await pcMap[d.from]?.setRemoteDescription(new RTCSessionDescription(d.sdp));
                        drainCandidates(d.from);
                    } catch (e) { console.error(e); }
                    break;
                case 'candidate':
                    if (d.to !== myId) break;
                    try {
                        const pc = pcMap[d.from];
                        if (pc && pc.remoteDescription && pc.remoteDescription.type) {
                            await pc.addIceCandidate(new RTCIceCandidate(d.candidate));
                        } else {
                            if (!candidateQueue[d.from]) candidateQueue[d.from] = [];
                            candidateQueue[d.from].push(d.candidate);
                        }
                    } catch (_) {}
                    break;
            }
        }

        fetchIceServers().then(connectWS);
    </script>
</body>

</html>
