<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>TeleRTC Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #07090f;
            --card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #7c6fff;
            --green: #00e87a;
            --yellow: #ffc940;
            --danger: #ff4466;
            --muted: #6b7db3;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: #e8eaf6;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            height: 60px;
            background: rgba(7, 9, 15, .9);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(16px);
        }

        .logo {
            font-weight: 800;
            font-size: 16px;
            letter-spacing: -.02em;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .logo span {
            font-size: 20px
        }

        #clock {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: .03em;
            font-variant-numeric: tabular-nums
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 20px
        }

        /* stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 28px
        }

        @media(max-width:600px) {
            .stats {
                grid-template-columns: repeat(2, 1fr)
            }
        }

        .stat {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px
        }

        .stat-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 6px
        }

        .stat-val {
            font-size: 30px;
            font-weight: 800;
            line-height: 1
        }

        /* section */
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 7px
        }

        .live-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            display: inline-block;
            animation: pulse 1.4s ease-in-out infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(0, 232, 122, .4)
            }

            50% {
                opacity: .5;
                box-shadow: 0 0 0 6px rgba(0, 232, 122, 0)
            }
        }

        .updated {
            font-size: 11px;
            color: var(--muted)
        }

        /* table */
        .table-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px
        }

        thead tr {
            background: rgba(255, 255, 255, .03)
        }

        th {
            text-align: left;
            padding: 11px 16px;
            font-size: 10px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: .07em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border)
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, .04);
            vertical-align: middle
        }

        tr:last-child td {
            border-bottom: none
        }

        tr:hover td {
            background: rgba(255, 255, 255, .02)
        }

        /* chips */
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 600
        }

        .chip.active {
            background: rgba(0, 232, 122, .1);
            color: var(--green);
            border: 1px solid rgba(0, 232, 122, .25)
        }

        .chip.waiting {
            background: rgba(255, 201, 64, .1);
            color: var(--yellow);
            border: 1px solid rgba(255, 201, 64, .25)
        }

        .chip.ended {
            background: rgba(255, 255, 255, .05);
            color: var(--muted);
            border: 1px solid var(--border)
        }

        /* uid */
        .uid {
            font-family: monospace;
            font-size: 11px;
            background: rgba(124, 111, 255, .1);
            color: var(--accent);
            border: 1px solid rgba(124, 111, 255, .18);
            padding: 2px 8px;
            border-radius: 6px
        }

        /* spy btn */
        .spy-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 14px;
            border-radius: 8px;
            background: rgba(255, 68, 102, .1);
            border: 1px solid rgba(255, 68, 102, .25);
            color: var(--danger);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background .2s
        }

        .spy-btn:hover {
            background: rgba(255, 68, 102, .2)
        }

        .spy-btn-dis {
            opacity: .3;
            cursor: default;
            pointer-events: none
        }

        /* empty */
        .empty {
            padding: 52px;
            text-align: center;
            color: var(--muted)
        }

        .empty div {
            font-size: 36px;
            margin-bottom: 10px;
            opacity: .3
        }

        .empty p {
            font-size: 13px
        }

        /* refresh badge */
        .refresh-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 100px;
            background: rgba(124, 111, 255, .1);
            border: 1px solid rgba(124, 111, 255, .2);
            color: var(--accent);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }

        .refresh-badge:hover {
            background: rgba(124, 111, 255, .2)
        }
    </style>
</head>

<body>

    <header>
        <div class="logo"><span>🛰</span> TeleRTC Admin</div>
        <div id="clock">--:--:--</div>
    </header>

    <main>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Total</div>
                <div class="stat-val" id="s-total" style="color:var(--accent)">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Active</div>
                <div class="stat-val" id="s-active" style="color:var(--green)">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Waiting</div>
                <div class="stat-val" id="s-wait" style="color:var(--yellow)">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Ended</div>
                <div class="stat-val" id="s-ended" style="color:var(--danger)">0</div>
            </div>
        </div>

        <div class="section-head">
            <div class="section-title">
                <span class="live-dot"></span> Active Call Sessions
            </div>
            <div style="display:flex;align-items:center;gap:10px">
                <span class="updated" id="upd-lbl">—</span>
                <span class="refresh-badge" onclick="refresh()">↻ Refresh</span>
            </div>
        </div>

        <div class="table-wrap">
            <div class="empty" id="empty-state">
                <div>📭</div>
                <p>No active sessions</p>
            </div>
            <table id="rooms-tbl" style="display:none">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Caller</th>
                        <th>Callee</th>
                        <th>Room ID</th>
                        <th>Status</th>
                        <th>Duration</th>
                        <th>Spy</th>
                    </tr>
                </thead>
                <tbody id="tbl-body"></tbody>
            </table>
        </div>
    </main>

    <script>
        const PWD = "{{ password }}";

        // ── Clock ──
        setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);

        function fmtDur(s) {
            if (s < 60) return s + 's';
            if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
            return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
        }

        async function getSpy(roomId) {
            try {
                const r = await fetch(`/api/admin/spy/${roomId}?password=${encodeURIComponent(PWD)}`, { method: 'POST' });
                if (!r.ok) return null;
                const d = await r.json();
                return d.spy_token;
            } catch { return null; }
        }

        async function openSpy(roomId) {
            const tok = await getSpy(roomId);
            if (!tok) { alert('Failed to create spy session'); return; }
            window.open(`/spy/${tok}`, '_blank');
        }

        async function refresh() {
            document.getElementById('upd-lbl').textContent = 'Loading…';
            try {
                const r = await fetch(`/api/admin/rooms?password=${encodeURIComponent(PWD)}`);
                if (!r.ok) { document.getElementById('upd-lbl').textContent = '❌ Auth error'; return; }
                const rooms = await r.json();

                document.getElementById('s-total').textContent = rooms.length;
                document.getElementById('s-active').textContent = rooms.filter(r => r.status === 'active').length;
                document.getElementById('s-wait').textContent = rooms.filter(r => r.status === 'waiting').length;
                document.getElementById('s-ended').textContent = rooms.filter(r => r.status === 'ended').length;

                const body = document.getElementById('tbl-body');
                const tbl = document.getElementById('rooms-tbl');
                const empty = document.getElementById('empty-state');

                if (!rooms.length) {
                    tbl.style.display = 'none';
                    empty.style.display = 'block';
                } else {
                    empty.style.display = 'none';
                    tbl.style.display = 'table';
                    body.innerHTML = rooms.map((rm, i) => {
                        const sc = rm.status === 'active' ? 'active' : rm.status === 'waiting' ? 'waiting' : 'ended';
                        const ico = rm.status === 'active' ? '🟢' : rm.status === 'waiting' ? '🟡' : '⚫';
                        const canSpy = rm.status !== 'ended';
                        return `<tr>
          <td style="color:var(--muted)">${i + 1}</td>
          <td><span class="uid">${rm.caller_id}</span></td>
          <td><span class="uid">${rm.callee_id}</span></td>
          <td style="color:var(--muted);font-family:monospace;font-size:11px">${rm.room_id.slice(0, 14)}…</td>
          <td><span class="chip ${sc}">${ico} ${rm.status}</span></td>
          <td style="color:var(--muted);font-variant-numeric:tabular-nums">${fmtDur(rm.duration)}</td>
          <td>
            ${canSpy
                                ? `<span class="spy-btn" onclick="openSpy('${rm.room_id}')">👁 Watch</span>`
                                : `<span class="spy-btn spy-btn-dis">👁 Watch</span>`
                            }
          </td>
        </tr>`;
                    }).join('');
                }

                document.getElementById('upd-lbl').textContent = 'Updated ' + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('upd-lbl').textContent = '⚠️ Error: ' + e.message;
            }
        }

        refresh();
        setInterval(refresh, 5000);
    </script>
</body>

</html>
